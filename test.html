<!DOCTYPE html>
<html>
<head>
<style>
  .box {
    position: absolute;
    left: 200px;
    top: 200px;
    width: 100px;
    height: 100px;
    background: red;
    transform-origin: center;
    /* test transform */
    transform: translate(-50%, -50%) rotate(45deg);
  }
  .center {
    position: absolute;
    left: 200px;
    top: 200px;
    width: 4px;
    height: 4px;
    background: blue;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
  <div class="box"></div>
  <div class="center"></div>
</body>
</html>
